name: Publish to BCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (e.g. v0.1.3)"
        required: true
        type: string

jobs:
  publish:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@main
    with:
      tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
      registry_fork: erneestoc/bazel-central-registry
      # We don't generate build-provenance attestations for the source
      # archive (that requires publish-to-bcr's paired release workflow).
      attest: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    secrets:
      # Classic PAT with repo + workflow scope; used to push the BCR fork
      # branch and open the registry PR. Set in repo settings -> secrets.
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
