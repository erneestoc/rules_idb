name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # A release must never ship from an unvalidated commit.
      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 120); do
            status=$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$GITHUB_SHA" --workflow CI --json status,conclusion --jq '.[0].status + "/" + (.[0].conclusion // "")')
            case "$status" in
              completed/success) echo "CI green"; exit 0 ;;
              completed/*) echo "CI failed: $status"; exit 1 ;;
              *) echo "waiting for CI ($status)"; sleep 30 ;;
            esac
          done
          echo "timed out waiting for CI"; exit 1

      - name: Create deterministic source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --prefix="rules_idb-$VERSION/" -o "rules_idb-$VERSION.tar.gz" "$GITHUB_REF_NAME"
          shasum -a 256 "rules_idb-$VERSION.tar.gz"

      # Create first, upload with retries after: attaching assets during
      # create can time out and leave hidden drafts.
      - name: Create release and upload source archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes || true
          for i in 1 2 3; do gh release upload "$GITHUB_REF_NAME" "rules_idb-$VERSION.tar.gz" --clobber && break; done
          echo "NOTE: attach the idb-companion-dist.tar.gz artifact (build-idb-dist workflow), update the release notes per RELEASING.md, then un-draft. Publishing the release triggers the BCR PR."
