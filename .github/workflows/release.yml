name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # A release must never ship from an unvalidated commit. Any green
      # completed CI run for this commit counts; a cold-cache companion
      # build can take ~90 minutes, hence the long window. Tags don't
      # trigger CI themselves, so a commit that never reached main or a PR
      # has no run at all -- fail fast on that instead of burning the window.
      - name: Wait for CI to pass on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 300); do
            runs=$(gh run list --repo "$GITHUB_REPOSITORY" --commit "$GITHUB_SHA" --workflow CI --json status,conclusion --jq 'map(.status + "/" + (.conclusion // "")) | join(" ")')
            if [[ "$runs" == *"completed/success"* ]]; then echo "CI green"; exit 0; fi
            if [[ -z "$runs" && "$i" -ge 10 ]]; then
              echo "no CI run exists for $GITHUB_SHA -- push it to main or a PR first"; exit 1
            fi
            if [[ -n "$runs" && "$runs" != *"in_progress"* && "$runs" != *"queued"* && "$runs" != *"waiting"* && "$runs" != *"pending"* && "$runs" != *"requested"* ]]; then
              echo "all CI runs completed without success: $runs"; exit 1
            fi
            echo "waiting for CI ($runs)"; sleep 30
          done
          echo "timed out waiting for CI"; exit 1

      - name: Create deterministic source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --prefix="rules_idb-$VERSION/" -o "rules_idb-$VERSION.tar.gz" "$GITHUB_REF_NAME"
          shasum -a 256 "rules_idb-$VERSION.tar.gz"

      # Create first, upload with retries after: attaching assets during
      # create can time out and leave hidden drafts.
      - name: Create release and upload source archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes || true
          for i in 1 2 3; do gh release upload "$GITHUB_REF_NAME" "rules_idb-$VERSION.tar.gz" --clobber && break; done
          echo "NOTE: attach the idb-companion-dist.tar.gz artifact (build-idb-dist workflow), update the release notes per RELEASING.md, then un-draft. Publishing the release triggers the BCR PR."
