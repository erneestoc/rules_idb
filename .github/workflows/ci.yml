name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # facebook/idb revision the companion is built from; must match
  # docs/BUILDING_IDB.md and the build-idb-dist workflow default.
  IDB_COMMIT: 70d75b32ada839d85a860029e4c9da0224fe57eb

jobs:
  # Build the companion from the CURRENT commit's pin + patches (not from a
  # release), cached on (idb commit, patch contents).
  build-companion:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # Selected before the cache step so the Xcode version can be part of
      # the cache key: without it, an image update that bumps Xcode keeps
      # serving a companion built by the previous toolchain.
      - name: Select Xcode
        id: xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)"
          xcodebuild -version
          echo "version=$(xcodebuild -version | tr '\n' '-' | tr -c 'A-Za-z0-9.-' '_')" >> "$GITHUB_OUTPUT"

      - id: cache
        uses: actions/cache@v4
        with:
          path: idb-companion-dist.tar.gz
          key: companion-${{ env.IDB_COMMIT }}-${{ hashFiles('patches/idb-build-fixes.patch') }}-${{ steps.xcode.outputs.version }}-v2

      - name: Build companion from pinned commit + patches
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          brew install xcodegen protobuf swift-protobuf
          git clone https://github.com/facebook/idb.git idb-src
          cd idb-src
          git checkout "$IDB_COMMIT"
          git apply "$GITHUB_WORKSPACE/patches/idb-build-fixes.patch"
          # Only what the test runner needs: the Repl shims (idb's REPL
          # feature, unused here) fail to build on newer toolchains.
          ./build.sh build Shimulator-iOS
          ./build.sh build Shimulator-macOS
          ./build.sh build SimulatorFrameworkBridge
          # First clean invocation reliably fails with "no such module
          # IDBGRPCSwift" (upstream xcodegen project quirk); the framework
          # exists afterwards and the retry succeeds.
          ./build.sh build idb_companion || ./build.sh build idb_companion
          R=Build/Products/Release
          S=Build/Products/Release-iphonesimulator
          D="$GITHUB_WORKSPACE/idb-dist"
          mkdir -p "$D/Resources"
          cp "$R/idb_companion" "$D/"
          for b in "$R"/*.bundle; do [ -e "$b" ] && ditto "$b" "$D/$(basename "$b")"; done
          cp "$S/libShimulator-iOS.dylib" "$R/libShimulator-macOS.dylib" \
             "$S/SimulatorFrameworkBridge" "$D/Resources/"
          tar -czf "$GITHUB_WORKSPACE/idb-companion-dist.tar.gz" -C "$D" .

      - uses: actions/upload-artifact@v4
        with:
          name: companion-dist
          path: idb-companion-dist.tar.gz

  test:
    needs: build-companion
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: "26.2"
            required: true
          - xcode: "26.4.1"
            required: true
          - xcode: "26.5"
            required: true
          # Xcode 27 beta is not on GitHub's images yet
          # (actions/runner-images#14196); re-add when it ships:
          # - xcode: "27"
          #   required: false
    runs-on: macos-26
    timeout-minutes: 60
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: companion-dist

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          match=$(ls -d "/Applications/Xcode_${{ matrix.xcode }}"*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -z "$match" ]]; then
            echo "::error::Xcode ${{ matrix.xcode }} not on this image. Available:"
            ls -d /Applications/Xcode_*.app
            exit 1
          fi
          sudo xcode-select -s "$match"
          xcodebuild -version

      # Hosted runners are small VMs with very slow first simulator boots;
      # boot one pool simulator up front (no test timeout applies here) and
      # run the suite serialized against it, warm.
      - name: Pre-boot simulator
        env:
          RULES_IDB_COMPANION_DIST_URL: file://${{ github.workspace }}/idb-companion-dist.tar.gz
        run: bazelisk run //tools:preboot -- 1 --device "iPhone 17 Pro"

      - name: Run example test suite
        env:
          RULES_IDB_COMPANION_DIST_URL: file://${{ github.workspace }}/idb-companion-dist.tar.gz
        run: |
          bazelisk test \
            //examples:LogicTests //examples:HostedTests //examples:UITests \
            //examples:HostedTestsRandom //examples:HostedTestsHooks \
            //examples:SwiftTestingTests //examples:SkippingTests \
            //examples:HostedTestsSharded \
            --local_test_jobs=1 \
            --test_output=errors

      - name: Behavioral validation of the runner
        if: matrix.xcode == '26.2'
        env:
          RULES_IDB_COMPANION_DIST_URL: file://${{ github.workspace }}/idb-companion-dist.tar.gz
        run: ./tests/validate.sh

  # Consumers fetch the companion from the pinned GitHub release
  # (idb/extensions.bzl), not from CI's freshly built artifact -- exercise
  # that real path too. Informational: a commit that requires a newer
  # companion than the released one is legitimate mid-release (RELEASING.md).
  test-released-companion:
    runs-on: macos-26
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)"
          xcodebuild -version

      - name: Pre-boot simulator
        run: bazelisk run //tools:preboot -- 1 --device "iPhone 17 Pro"

      - name: Run example test suite against the released companion
        run: |
          bazelisk test \
            //examples:LogicTests //examples:HostedTests \
            --local_test_jobs=1 \
            --test_output=errors
